<!DOCTYPE html>
<html lang='en'>
  <head>
    <meta charset='UTF-8'/>
    <title>Customer Subscription Form</title>
    <link rel='stylesheet' href='css/flowershop-style.css'/> 
  </head>
  <body>

    <h1 style="text-align: left;"> Essence & Bloom Flower Shop </h1>
    <h2><img class="left-img" src='images/flower_shop_logo.jpg' width= "160" alt='Website logo: Essence & Bloom Flower Shop with beautiful orange flowers'/> </h2>

       <header class = "header">
      <h1 style="text-align: left;">Navigational Links</h1>
      <nav class = "nav">
        <ul>
          <li><a href="homepage.html">Home</a></li>
          <li><a href="aboutus.html">About Us</a></li>
          <li><a href="contactus.html">Contact Us</a></li>
          <li><a href="products.html">Shop</a></li>
          

        </ul>
      </nav>
    </header>
        
    <header class='subcription-form-header'>
        <h1>Join Our Subscription</h1>

        <p style=text-align:center;> Do you want to recieve fresh flowers delivered to your home or workplace daily or monthly. Fill out this form.</p>
    
    
    </header>
    <form action='' method='get' class='speaker-form'>
        <!--Text input filed-->
        <div class='form-row'>
			<label for='full-name'>Name</label>
			<input id='full-name' name='full-name' type='text' placeholder='Please enter your full name'/>
		</div>

        <!--Email input field-->
        <div class='form-row'>
            <label for='email'>Email</label>
            <input id='email' name='email' type='email' placeholder='joe@example.com'/>
        </div>

       <!--Phone number input field-->
        <div class='form-row'>
            <label for='phone number'>Phone Contact </label>
            <input id='phone number' name='phone number' type='phone number' placeholder='123456789101'/>
        </div>
</body>
</html>
